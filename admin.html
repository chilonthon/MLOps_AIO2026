<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — 5G Network Quality</title>
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/admin.css" />
</head>
<body data-page="admin">
  <!-- Navigation Bar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="navbar__logo" aria-label="5G Dashboard home">
      <svg class="navbar__logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path d="M1.5 8.5a14.5 14.5 0 0 1 21 0M5 12a11 11 0 0 1 14 0M8.5 15.5a7 7 0 0 1 7 0M12 19h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>5G Dashboard</span>
    </a>
    <div class="navbar__links">
      <a href="index.html" class="navbar__link">Dashboard</a>
      <a href="admin.html" class="navbar__link navbar__link--active" aria-current="page">Admin Panel</a>
    </div>
  </nav>

  <main id="main-content">
    <header id="admin-header" class="admin-header">
      <div class="admin-header__left">
        <h1 class="admin-header__title">Admin Panel</h1>
        <span class="admin-header__badge">UPLOAD FILE ONLY</span>
      </div>
    </header>

    <section id="upload-section">
      <form id="upload-form">
        <p>
          Upload a new 5G drive-test CSV. The file will be sent to the S3 Raw Data bucket, triggering the automated SageMaker processing pipeline.
        </p>

        <div class="form-group">
          <label for="csv-file-input">Choose File</label>
          <input type="file" id="csv-file-input" accept=".csv" />
        </div>

        <button type="button" id="upload-btn" class="btn btn--primary" disabled>
          Upload to S3
        </button>

        <div id="upload-feedback"></div>
      </form>
    </section>

    <section id="s3-viewer-section">
      <div class="s3-viewer-grid">
        <div class="s3-viewer-column">
          <h2 class="s3-viewer-column__title">RAW DATASETS</h2>
          <div id="raw-datasets-container"></div>
        </div>
        <div class="s3-viewer-column">
          <h2 class="s3-viewer-column__title">PROCESSED DATASETS</h2>
          <div id="processed-datasets-container"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer" role="contentinfo">
    <div class="footer__bottom">
      &copy; AIO2026. All rights reserved.
    </div>
  </footer>

  <script src="aws/config.js"></script>
  <script type="module">
    import { s3Client } from './aws/s3client.js';
    import { loadDatasetColumn } from './aws/s3viewer.js';
    import { initUploadForm } from './aws/upload.js';

    // Upload form
    const form = document.getElementById('upload-form');
    initUploadForm(form, s3Client, window.APP_CONFIG.rawBucket);

    // S3 viewer
    loadDatasetColumn(
      document.getElementById('raw-datasets-container'),
      s3Client,
      window.APP_CONFIG.rawBucket,
      'No raw datasets found'
    );
    loadDatasetColumn(
      document.getElementById('processed-datasets-container'),
      s3Client,
      window.APP_CONFIG.processedBucket,
      'No processed datasets found'
    );
  </script>
</body>
</html>
