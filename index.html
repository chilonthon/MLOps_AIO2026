<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5G Network Quality Dashboard</title>
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/dashboard.css" />
  <script src="https://unpkg.com/amazon-quicksight-embedding-sdk/dist/quicksight-embedding-js-sdk.min.js"></script>
</head>
<body data-page="dashboard">
  <!-- Navigation Bar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="navbar__logo" aria-label="5G Dashboard home">
      <svg class="navbar__logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <path d="M1.5 8.5a14.5 14.5 0 0 1 21 0M5 12a11 11 0 0 1 14 0M8.5 15.5a7 7 0 0 1 7 0M12 19h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>5G Dashboard</span>
    </a>
    <div class="navbar__links">
      <a href="index.html" class="navbar__link navbar__link--active" aria-current="page">Dashboard</a>
      <a href="admin.html" class="navbar__link">Admin Panel</a>
    </div>
  </nav>

  <main id="main-content">
    <section id="dashboard-section">
      <h1 class="dashboard__title">5G Network Quality Dashboard</h1>
      <p class="dashboard__subtitle">Interactive visualisations of cleaned 5G throughput and coverage data.</p>
      <div id="quicksight-container" class="quicksight-container"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer" role="contentinfo">
    <div class="footer__bottom">
      &copy; AIO2026. All rights reserved.
    </div>
  </footer>

  <script src="aws/config.js"></script>
  <script type="module">
    import { initQuickSightDashboard } from './aws/quicksight.js';

    initQuickSightDashboard(
      document.getElementById('quicksight-container'),
      window.APP_CONFIG.quicksightEmbedUrl
    );
  </script>
</body>
</html>
